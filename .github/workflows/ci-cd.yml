name: CI-CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: internal-sandbox-446612
  REGION: asia-south1
  REPO: my-repo
  IMAGE: devops-app
  CLUSTER: my-cluster
  ZONE: asia-south1-a

jobs:

  # ✅ 1. TEST JOB (NEW)
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test


  # ✅ 2. BUILD & DEPLOY JOB
  build-deploy:
    needs: test   # 👈 ensures test runs first
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Auth
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # ✅ Docker
      - name: Configure Docker
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev -q

      - name: Build Docker Image
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}

      # ✅ GKE Deploy
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.ZONE }}

      - name: Deploy to GKE
        run: |
          kubectl set image deployment/devops-app devops-app=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}
          kubectl rollout status deployment/devops-app

name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: internal-sandbox-446612
  REGION: asia-south1
  REPO: my-repo
  IMAGE: devops-app
  CLUSTER: my-cluster
  ZONE: asia-south1-a

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    steps:
- name: Checkout code
  uses: actions/checkout@v3

# ✅ NEW AUTH (ADD HERE)
- name: Authenticate to GCP
  uses: google-github-actions/auth@v2
  with:
    credentials_json: '${{ secrets.GCP_SA_KEY }}'

- name: Setup gcloud CLI
  uses: google-github-actions/setup-gcloud@v2

# ✅ Docker steps
- name: Configure Docker
  run: gcloud auth configure-docker $REGION-docker.pkg.dev -q

- name: Build Docker Image
  run: |
    docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }} .

- name: Push Docker Image
  run: |
    docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}

# ✅ ADD YOUR BLOCK HERE (IMPORTANT POSITION)
- name: Get GKE credentials
  uses: google-github-actions/get-gke-credentials@v2
  with:
    cluster_name: ${{ env.CLUSTER }}
    location: ${{ env.ZONE }}

- name: Deploy to GKE
  run: |
    kubectl set image deployment/devops-app devops-app=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$IMAGE:${{ github.sha }}
    kubectl rollout status deployment/devops-app

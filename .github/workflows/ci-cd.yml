name: CI-CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/my-app

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests found"

  build:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      # 🔍 Debug (helps you see values in logs)
      - name: Debug Variables
        run: |
          echo "IMAGE=${{ env.IMAGE }}"
          echo "SHA=${{ github.sha }}"
          pwd
          ls -la

      # 🔥 FIXED BUILD STEP (NO MORE buildx ERROR)
      - name: Build Docker Image
        shell: bash
        run: |
          set -e
          IMAGE="${{ env.IMAGE }}"
          TAG="${{ github.sha }}"
          echo "Building image: $IMAGE:$TAG"
          docker build -t "$IMAGE:$TAG" .

      # 🔥 SAFE PUSH STEP
      - name: Push Docker Image
        shell: bash
        run: |
          IMAGE="${{ env.IMAGE }}"
          TAG="${{ github.sha }}"
          docker push "$IMAGE:$TAG"

  deploy:
    name: Deploy to GKE
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER }}
          location: ${{ secrets.GKE_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Kubernetes
        shell: bash
        run: |
          IMAGE="${{ env.IMAGE }}"
          TAG="${{ github.sha }}"
          kubectl set image deployment/my-app my-app="$IMAGE:$TAG" -n ${{ secrets.GKE_NAMESPACE }}
          kubectl rollout status deployment/my-app -n ${{ secrets.GKE_NAMESPACE }}

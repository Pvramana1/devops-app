steps:
# STEP 1: Build Docker Image
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t',
    'asia-south1-docker.pkg.dev/$PROJECT_ID/devops-repo/devops-app:$SHORT_SHA',
    '.'
  ]

# STEP 2: Push to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push',
    'asia-south1-docker.pkg.dev/$PROJECT_ID/devops-repo/devops-app:$SHORT_SHA'
  ]

# STEP 3: Deploy to GKE (update image)
- name: 'gcr.io/cloud-builders/kubectl'
  args:
    - 'set'
    - 'image'
    - 'deployment/devops-app'
    - 'devops-app=asia-south1-docker.pkg.dev/$PROJECT_ID/devops-repo/devops-app:$SHORT_SHA'
  env:
    - 'CLOUDSDK_COMPUTE_REGION=asia-south1'
    - 'CLOUDSDK_CONTAINER_CLUSTER=my-cluster'

images:
- 'asia-south1-docker.pkg.dev/$PROJECT_ID/devops-repo/devops-app:$SHORT_SHA'

options:
  default_logs_bucket_behavior: REGIONAL_USER_OWNED_BUCKET

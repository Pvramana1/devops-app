stages:
  - build
  - test
  - deploy

# -------------------------
# VARIABLES
# -------------------------
variables:
  IMAGE: "$CI_REGISTRY_IMAGE/devops-app"
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""

# -------------------------
# BUILD STAGE
# -------------------------
build_job:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Starting build stage"
    - docker info
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - echo "Build completed"

# -------------------------
# TEST STAGE
# -------------------------
test_job:
  stage: test
  image: alpine:latest
  script:
    - echo "Running test stage"
    - echo "Tests passed successfully"

# -------------------------
# DEPLOY STAGE
# -------------------------
deploy_job:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Starting deploy stage"
    - echo "Deployment successful"
  only:
    - main

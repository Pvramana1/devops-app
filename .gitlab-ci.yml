stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: "production"

# ---------------- BUILD ----------------
build_job:
  stage: build
  image: node:18
  script:
    - echo "Installing dependencies"
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# ---------------- TEST ----------------
test_job:
  stage: test
  image: node:18
  script:
    - echo "Running tests"
    - npm install
    - npm test
  cache:
    paths:
      - node_modules/

# ---------------- DEPLOY ----------------
deploy_job:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying application"
    - echo "Add your deploy script here"
  only:
    - main

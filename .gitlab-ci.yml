stages:
  - build
  - test

variables:
  NODE_ENV: "test"

# --------------------
# BUILD STAGE
# --------------------
build-job:
  stage: build
  image: node:18
  script:
    - echo "Installing dependencies..."
    - npm install
    - echo "Building application..."
    - npm run build
  artifacts:
    paths:
      - node_modules/
      - dist/
    expire_in: 1 hour

# --------------------
# TEST STAGE
# --------------------
test-job:
  stage: test
  image: node:18
  script:
    - echo "Running tests..."
    - npm install
    - npm test
  dependencies:
    - build-job

stages:

* build
* test
* deploy

build_job:
stage: build
image: node:18
script:
- echo "Installing dependencies"
- npm install
- echo "Building app"
- npm run build || echo "No build step"

test_job:
stage: test
image: node:18
script:
- echo "Running tests"
- npm install
- npm test || echo "No tests found"

deploy_job:
stage: deploy
image: alpine:latest
script:
- echo "Deploying application"
only:
- main


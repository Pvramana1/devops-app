stages:
  - build
  - test
  - deploy

build_job:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Docker Image..."
    - docker build -t devops-app .

test_job:
  stage: test
  image: node:18
  script:
    - echo "Running Tests..."
    - npm install
    - npm test

deploy_job:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying Application..."
    - ./deploy.sh
  only:
    - main

stages:

* build
* test
* deploy

build_job:
stage: build
image: node:18
script:
- echo "Installing dependencies"
- npm install

test_job:
stage: test
image: node:18
script:
- echo "Running tests"
- npm test || echo "No tests found"

deploy_job:
stage: deploy
image: alpine:latest
script:
- echo "Deploy step completed"
only:
- main


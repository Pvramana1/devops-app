stages:
  - build
  - test
  - deploy

variables:
  IMAGE: "$CI_REGISTRY_IMAGE/devops-app"
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""

# -------------------------
# BUILD
# -------------------------
build_job:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Docker image"
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
  artifacts:
    paths:
      - image.tar

# -------------------------
# TEST
# -------------------------
test_job:
  stage: test
  image: python:3.10
  script:
    - echo "Installing dependencies"
    - pip install -r requirements.txt || echo "No requirements.txt"
    - echo "Running tests"
  cache:
    paths:
      - .cache/pip

# -------------------------
# DEPLOY
# -------------------------
deploy_job:
  stage: deploy
  image: google/cloud-sdk:latest
  script:
    - echo "Deploy step"
  only:
    - main

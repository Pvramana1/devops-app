stages:
  - build
  - test
  - deploy

variables:
  IMAGE: "$CI_REGISTRY_IMAGE/devops-app"
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_TLS_CERTDIR: ""

# -------------------------
# BUILD STAGE
# -------------------------
build_job:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE:$CI_COMMIT_SHA .
    - docker save $IMAGE:$CI_COMMIT_SHA > image.tar
  artifacts:
    paths:
      - image.tar

# -------------------------
# TEST STAGE
# -------------------------
test_job:
  stage: test
  image: python:3.10
  script:
    - pip install -r requirements.txt || echo "No requirements file"
    - echo "Running tests"
  cache:
    paths:
      - .cache/pip

# -------------------------
# DEPLOY STAGE
# -------------------------
deploy_job:
  stage: deploy
  image: google/cloud-sdk:latest
  script:
    - echo "$GCP_KEY" > key.json
    - echo "Deploy step (skipped for now)"
  only:
    - main
